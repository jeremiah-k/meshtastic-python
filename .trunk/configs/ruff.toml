# Generic, formatter-friendly config.
[lint]
select = ["B", "D3", "D4", "E", "F"]

# Never enforce `E501` (line length violations). This should be handled by formatters.
ignore = ["E501"]

[lint.pydocstyle]
convention = "numpy"

# Generated protobuf modules rely on import side effects during descriptor loading.
# BLE interface package has relaxed docstring requirements.
[lint.per-file-ignores]
"meshtastic/protobuf/*_pb2.py" = ["F401"]
"meshtastic/interfaces/ble/client.py" = ["D401"]
"meshtastic/interfaces/ble/connection.py" = ["D401"]
"meshtastic/interfaces/ble/coordination.py" = ["D401"]
"meshtastic/interfaces/ble/discovery.py" = ["D401"]
"meshtastic/interfaces/ble/gating.py" = ["D401"]
"meshtastic/interfaces/ble/interface.py" = ["D401"]
"meshtastic/interfaces/ble/policies.py" = ["D401"]
"meshtastic/interfaces/ble/reconnection.py" = ["D401"]
"meshtastic/interfaces/ble/runner.py" = ["D401"]
"meshtastic/interfaces/ble/state.py" = ["D401"]
