name: CI
on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
      - "**-review"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CI_ASSERT_MODULE_STATE_DRIFT: "true"

jobs:
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - &checkout_step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - &setup_python_step
        name: Install Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - &cache_poetry_step
        name: Cache Poetry artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.0
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PYTHON_VERSION }}-poetry-
            ${{ runner.os }}-poetry-
      - &install_dependencies_step
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.3.2"
      - &install_local_step
        name: Install meshtastic from local
        run: |
          poetry install ${{ env.POETRY_INSTALL_ARGS }}
          poetry run meshtastic --version
      - name: Run tests with pytest
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            poetry run pytest --cov=meshtastic --cov-report=xml
          else
            poetry run pytest --cov=meshtastic
          fi
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jeremiah-k/meshtastic-python
  pylint:
    name: Pylint (py3.13)
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Run pylint
        run: poetry run pylint meshtastic examples/ --ignore-patterns ".*_pb2\.pyi?$"
  mypy:
    name: Mypy (py3.13)
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Check types with mypy
        run: poetry run mypy meshtastic/
  # Fast install sanity check across Python versions.
  # Full tests run in the tests job above.
  # Lint/type checks run in dedicated jobs for earlier independent failures.
  validate:
    name: Validate install (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
      # Validate base package installs without extras.
      POETRY_INSTALL_ARGS: ""
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
