name: CI
on:
  push:
    branches:
      - master
      - "**-review"
  pull_request:
    branches:
      - master
      - "**-review"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CI_ASSERT_MODULE_STATE_DRIFT: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    env:
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - &checkout_step
        uses: actions/checkout@v4
      - &setup_python_step
        name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - &cache_poetry_step
        name: Cache Poetry artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python-version }}-poetry-
            ${{ runner.os }}-poetry-
      - &install_dependencies_step
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.3.2"
      - &install_local_step
        name: Install meshtastic from local
        run: |
          poetry install ${{ env.POETRY_INSTALL_ARGS }}
          poetry run meshtastic --version
      - name: Run tests with pytest
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            poetry run pytest --cov=meshtastic --cov-report=xml
          else
            poetry run pytest --cov=meshtastic
          fi
      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS, PYTHON
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
      - name: Run pylint
        if: ${{ matrix.python-version == '3.13' }}
        run: poetry run pylint meshtastic examples/ --ignore-patterns ".*_pb2\.pyi?$"
      - name: Check types with mypy
        if: ${{ matrix.python-version == '3.13' }}
        run: poetry run mypy meshtastic/
  validate:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    env:
      POETRY_INSTALL_ARGS: ""
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
