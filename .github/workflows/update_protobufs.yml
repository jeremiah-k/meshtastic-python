name: Update protobufs
on: workflow_dispatch

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NANOPB_VERSION: "0.4.9.1"

jobs:
  update-protobufs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Update protobuf submodule
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule update --remote --recursive

      - name: Download nanopb
        run: |
          curl -fsSL -o nanopb-${NANOPB_VERSION}-linux-x86.tar.gz https://jpa.kapsi.fi/nanopb/download/nanopb-${NANOPB_VERSION}-linux-x86.tar.gz
          tar xzf nanopb-${NANOPB_VERSION}-linux-x86.tar.gz
          mv nanopb-${NANOPB_VERSION}-linux-x86 nanopb-${NANOPB_VERSION}

      - name: Install Python dependencies
        run: |
          poetry install --with dev

      - name: Re-generate protocol buffers
        run: |
          ./bin/regen-protobufs.sh

      - name: Commit update
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'bot@noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add protobufs
          git add meshtastic/protobuf
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Update protobufs"
            git push
          else
            echo "No changes to commit"
          fi
