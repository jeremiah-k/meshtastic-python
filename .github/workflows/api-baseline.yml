name: API Baseline

on:
  pull_request:
    branches:
      - master
      - develop
      - "**-review"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  api-baseline-master:
    name: API Baseline vs Master (py3.13)
    runs-on: ubuntu-latest
    env:
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
      API_BASELINE_REF: master
    steps:
      - name: Checkout PR branch (current)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Cache Poetry artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-3.13-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-3.13-poetry-
            ${{ runner.os }}-poetry-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.3.2"
      - name: Install meshtastic from local
        run: |
          poetry install ${{ env.POETRY_INSTALL_ARGS }}
          poetry run meshtastic --version
      - name: Checkout API baseline branch (master)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.API_BASELINE_REF }}
          path: base-checkout
      - name: Extract base API surface (master)
        run: poetry run python3 bin/extract_api_surface.py base-checkout/meshtastic > base_surface.json
      - name: Extract PR API surface
        run: poetry run python3 bin/extract_api_surface.py meshtastic > pr_surface.json
      - name: Compare API surfaces vs master
        run: python3 bin/compare_api_surfaces.py base_surface.json pr_surface.json --base-label "${{ env.API_BASELINE_REF }}"

  api-baseline-develop:
    name: API Baseline vs Develop (py3.13)
    runs-on: ubuntu-latest
    needs: api-baseline-master
    continue-on-error: true
    if: always()
    env:
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
      API_BASELINE_REF: develop
    steps:
      - name: Checkout PR branch (current)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Cache Poetry artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-3.13-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-3.13-poetry-
            ${{ runner.os }}-poetry-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.3.2"
      - name: Install meshtastic from local
        run: |
          poetry install ${{ env.POETRY_INSTALL_ARGS }}
          poetry run meshtastic --version
      - name: Checkout API baseline branch (develop)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.API_BASELINE_REF }}
          path: base-checkout
      - name: Extract base API surface (develop)
        run: poetry run python3 bin/extract_api_surface.py base-checkout/meshtastic > base_surface.json
      - name: Extract PR API surface
        run: poetry run python3 bin/extract_api_surface.py meshtastic > pr_surface.json
      - name: Compare API surfaces vs develop (advisory)
        run: |
          python3 bin/compare_api_surfaces.py \
            base_surface.json \
            pr_surface.json \
            --base-label "${{ env.API_BASELINE_REF }}" \
            --warning-only
