name: Make Release
on: workflow_dispatch

concurrency:
  group: manual-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release_create:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.get_version.outputs.version }}
      new_sha: ${{ steps.commit_updated.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install poetry

      - name: Bump version
        run: >-
          poetry version patch

      - name: Get version
        id: get_version
        run: echo "version=$(poetry version --short)" >> "$GITHUB_OUTPUT"

      - name: Commit updated version.
        id: commit_updated
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'bot@noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "bump version to ${{ steps.get_version.outputs.version }}"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build a binary wheel and a source tarball
        run: >-
          poetry build

      - name: Upload Python distribution artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: python-dist
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          draft: true
          prerelease: true
          name: Meshtastic Python ${{ steps.get_version.outputs.version }}
          tag_name: ${{ steps.get_version.outputs.version }}
          target_commitish: ${{ steps.commit_updated.outputs.sha }}
          body: |
            Autogenerated by github action, developer should edit as required before publishing...
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-publish-ubuntu:
    runs-on: ubuntu-latest
    needs: release_create
    permissions:
      contents: write # needed to upload release assets
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release_create.outputs.new_sha }}

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Build
        run: |
          pip install poetry
          bin/build-bin.sh

      - name: Prepare release asset names
        run: |
          cp dist/meshtastic dist/meshtastic_ubuntu
          cp standalone_readme.txt dist/readme.txt

      - name: Add ubuntu assets to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.release_create.outputs.version }}
          draft: true
          prerelease: true
          files: |
            dist/meshtastic_ubuntu
            dist/readme.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'release' || github.event.release.draft == false }}
    # Require protected-environment approval before publishing.
    environment: pypi-release
    needs:
      - release_create
      - build-and-publish-ubuntu
    steps:
      - name: Download Python distribution artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
