  build-and-publish-ubuntu:
    runs-on: ubuntu-latest
    needs: release_create
    permissions:
      contents: write # needed to upload release assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release_create.outputs.new_sha }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build
        run: |
          pip install poetry
          bin/build-bin.sh

      - name: Prepare release asset names
        run: |
          cp dist/meshtastic dist/meshtastic_ubuntu
          cp standalone_readme.txt dist/readme.txt

      - name: Add ubuntu assets to release
        uses: softprops/action-gh-release@a06a81a84d0f8624ebde66576429f0c9aab0afdd # v2.5.0
        with:
          tag_name: ${{ needs.release_create.outputs.version }}
          files: |
            dist/meshtastic_ubuntu
            dist/readme.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

