name: Remove old artifacts

on:
  schedule:
    # Every day at 1am
    - cron: 0 1 * * *

  workflow_dispatch: {}

permissions:
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  remove-old-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Remove old artifacts
        # v1.4.0
        uses: c-hive/gha-remove-artifacts@44fc7acaf1b3d0987da0e8d4707a989d80e9554b
        with:
          age: 1 month
          skip-tags: true
