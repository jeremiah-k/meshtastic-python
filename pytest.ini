[pytest]

addopts = -m "not int and not smoke1 and not smoke1_destructive and not smoke2 and not smokewifi and not examples and not smokevirt and not slow"

junit_family = legacy

filterwarnings =
    ignore::DeprecationWarning

markers =
    unit: marks tests as unit tests
    unitslow: marks slow unit tests
    int: marks tests as integration tests
    smokevirt: marks tests as smoke tests against virtual device
    smoke1: runs smoke tests on a single device connected via USB
    smoke1_destructive: smoke1 tests that may leave hardware in reset/recovery state
    smoke2: runs smoke tests on a two devices connected via USB
    smokewifi: runs smoke test on an esp32 device setup with wifi
    examples: runs the examples tests which validates the library
    slow: marks tests as slow (excluded by addopts by default, unlike unitslow; use unitslow for slow unit tests that should still run in default CI)
